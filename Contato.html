<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio Pessoal - Contato</title>
    <!-- Vinculação do arquivo de estilização CSS externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Menu de navegação global (idêntico às páginas anteriores) -->
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Sobre mim</a></li>
                <li><a href="Formacao.html">Formação</a></li>
                <li><a href="Portfolio.html">Portfólio</a></li> <!-- Ajuste para projeto.html se optou por manter aquele nome -->
                <li><a href="Contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <!-- Conteúdo principal da página Contato -->
    <main>
        <section id="contato">
            <h1>Entre em Contato</h1>
            <p>Preencha o formulário abaixo para enviar uma mensagem. Todos os campos são obrigatórios.</p>
            
            <!-- Formulário de contato com ID para o JavaScript capturar -->
            <form id="formContato">
                <div class="campo">
                    <label for="nome">Nome:</label><br>
                    <input type="text" id="nome" placeholder="Digite seu nome completo">
                </div>

                <div class="campo">
                    <label for="email">E-mail:</label><br>
                    <input type="text" id="email" placeholder="exemplo@dominio.com">
                </div>

                <div class="campo">
                    <label for="mensagem">Mensagem:</label><br>
                    <textarea id="mensagem" rows="5" placeholder="Escreva sua mensagem aqui..."></textarea>
                </div>

                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <!-- Rodapé padrão -->
    <footer>
        <p>&copy; 2026 - Desenvolvido para a Atividade Prática UNINTER</p>
    </footer>

    <!-- Vinculação do arquivo JavaScript obrigatório (no final do body) -->
    <script src="script.js"></script>
</body>
</html>
